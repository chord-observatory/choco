{% set _group = group|default(none) %}
{% set _url = "/set-started-group/" ~ _group if _group else "/set-started-all" %}
{% set _scope = '"' ~ _group ~ '"' if _group else "all" %}
<span style="display: inline-flex; gap: 0.3em;">
    <button class="outline" title="Start {{ _scope }} nodes" style="padding: 0.1em 0.4em; margin: 0; font-size: 0.8em; background: #2ecc40; color: white; border-color: #2ecc40;"
            hx-post="{{ _url }}/start" hx-target="#dashboard-table" hx-swap="innerHTML"
            hx-vals='{"_csrf_token": "{{ csrf_token() }}"}'>&#x25B2;</button>
    <button class="outline" title="Stop {{ _scope }} nodes" style="padding: 0.1em 0.4em; margin: 0; font-size: 0.8em; background: #ffdc00; color: #333; border-color: #ffdc00;"
            hx-post="{{ _url }}/stop" hx-target="#dashboard-table" hx-swap="innerHTML"
            hx-vals='{"_csrf_token": "{{ csrf_token() }}"}'>&#x25BC;</button>
</span>

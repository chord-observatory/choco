# configTracker test 1

# use the config tracker
config_tracker: true

type: config
log_level: debug

cpu_affinity: [1,2,3,4]

num_frame_samples: 2048
buffer_depth: 2

# Pool
main_pool:
    kotekan_metadata_pool: chordMetadata
    num_metadata_objects: 2 * buffer_depth

# Buffers
send_buffer:
    kotekan_buffer: standard
    num_frames: buffer_depth
    frame_size: num_frame_samples
    metadata_pool: main_pool

# Kotekan stages
gen_data:
    # type: const
    # value: 34 # 1i # 34 # = 2 + 2i
    type: random_signed
    value: 1532
    kotekan_stage: testDataGen
    out_buf: send_buffer
    array_shape: [ 2048 ]
    dim_name: ["S"]
